name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Prepare deploy directory: new build + preserved preview dirs
      - name: Prepare deploy
        run: |
          git fetch origin gh-pages:gh-pages || true
          mkdir -p deploy
          cp -r dist/* deploy/
          # Preserve existing preview directories from gh-pages branch
          if git show gh-pages:preview 2>/dev/null; then
            git worktree add gh-pages-tree gh-pages
            if [ -d gh-pages-tree/preview ]; then
              cp -r gh-pages-tree/preview deploy/preview
            fi
            git worktree remove gh-pages-tree --force
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          force_orphan: true
